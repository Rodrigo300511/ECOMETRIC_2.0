<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecometric - Login</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    
    <style>
        .login-body {
            background-color: var(--light-bg, #f8fafc);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: var(--shadow-md, 0 4px 15px rgba(0,0,0,0.05));
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .login-title {
            color: var(--dark-green, #047857);
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark, #1e293b);
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color, #cbd5e1);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-green, #10b981);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--gradient-green, linear-gradient(135deg, #10b981 0%, #047857 100%));
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        .btn-login:hover {
            opacity: 0.9;
        }
        .error-msg {
            color: #dc2626;
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none; /* Controlado pelo JS */
            text-align: center;
        }
    </style>
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">🌱</div>
            <h2 class="login-title">Portal Ecometric</h2>
            <p style="color: #64748b; font-size: 0.85rem; margin-top: 5px;">Entre para gerenciar ou visualizar seu impacto</p>
        </div>

        <div id="mensagem-erro" class="error-msg"></div>

        <form id="form-login">
            <div class="form-group">
                <label for="usuario">Usuário ou Placa</label>
                <input type="text" id="usuario" placeholder="Ex: admin ou ABC1234" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login" id="btn-entrar">Entrar no Painel</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='login.js') }}"></script>
</body>
</html>
