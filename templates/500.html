<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro Interno | Ecometric</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Navegação -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <span class="logo-icon">🌱</span>
                <span class="logo-text">Ecometric</span>
            </div>
        </div>
    </nav>

    <!-- Conteúdo -->
    <main class="container">

        <section class="hero">
            <div class="hero-content">

                <div style="font-size: 6rem; margin-bottom: 20px;">
                    ⚠️
                </div>

                <h1 class="hero-title">
                    Erro 500
                </h1>

                <p class="hero-subtitle">
                    Ocorreu um erro interno no sistema.
                    Nossa equipe já foi notificada e está trabalhando para resolver o problema.
                </p>

                <div style="margin-top:40px;">
                    <a href="/"
                       style="
                       display:inline-block;
                       padding:15px 30px;
                       background:#10b981;
                       color:white;
                       text-decoration:none;
                       border-radius:12px;
                       font-weight:bold;
                       box-shadow:0 4px 12px rgba(0,0,0,.15);
                       ">
                        🏠 Voltar ao Dashboard
                    </a>
                </div>

            </div>
        </section>

        <section class="stats-section">

            <div class="stat-box">
                <h3>Status</h3>
                <div class="stat-number">500</div>
            </div>

            <div class="stat-box">
                <h3>Servidor</h3>
                <div class="stat-number">⚙️</div>
            </div>

            <div class="stat-box">
                <h3>Ecometric</h3>
                <div class="stat-number">🌱</div>
            </div>

        </section>

    </main>

    <footer class="footer">
        <p>🌱 Ecometric © 2026</p>
        <p>Inteligência Ambiental para Mobilidade Urbana</p>
    </footer>

</body>
</html>
